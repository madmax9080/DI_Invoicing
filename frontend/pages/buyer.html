<div class="reports-container buyer-page-shell">
    <section class="reports-hero buyer-hero">
        <div>
            <div class="hero-chip">Manage buyers</div>
            <h2>Create, update and organize buyer records.</h2>
            <p>Find buyers quickly, review their details, and keep your master data in sync.</p>
        </div>
        <button id="addBuyerBtn" class="export-btn">
            <i class="bi bi-plus-lg"></i>
            <span>Add Buyer</span>
        </button>
    </section>

    <section class="panel-card buyer-filter-panel">
        <div class="row g-3 align-items-end">
            <div class="col-lg-4 col-md-8">
                <label class="donezo-label">Search Buyer</label>
                <input
                    type="text"
                    id="buyerSearchInput"
                    class="form-control donezo-input"
                    placeholder="Search by NTN or Name"
                >
            </div>
            <div class="col-lg-2 col-md-4 d-flex gap-2">
                <button id="searchBuyerBtn" class="btn btn-donezo-primary flex-fill">Search</button>
                <button id="resetBuyerBtn" class="btn btn-donezo-secondary flex-fill">Reset</button>
            </div>
        </div>
    </section>

    <section class="panel-card table-panel">
        <div class="buyer-table-shell">
            <table class="donezo-table buyer-table table table-hover align-middle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Actions</th>
                        <th>NTN/CNIC</th>
                        <th>Name</th>
                        <th>Province</th>
                        <th>Address</th>
                        <th>Registration Type</th>
                    </tr>
                </thead>
                <tbody id="buyersTableBody">
                    <tr>
                        <td colspan="7">Loading buyers...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="donezo-pagination">
            <div class="pagination-info">
                Showing
                <span id="paginationStart">0</span>
                to
                <span id="paginationEnd">0</span>
                of
                <span id="paginationTotal">0</span>
                entries
            </div>
            <div class="pagination-buttons">
                <button id="prevPageBtn" class="btn btn-donezo-secondary btn-sm">Previous</button>
                <button id="nextPageBtn" class="btn btn-donezo-secondary btn-sm">Next</button>
            </div>
        </div>
    </section>
</div>
<!-- BUYER MODAL -->
<div
    class="modal fade"
    id="buyerModal"
    tabindex="-1"
    aria-hidden="true"
>
    <div class="modal-dialog modal-lg">
        <div
            class="
                modal-content
                border-0
                rounded-4
            "
        >
            <div class="modal-header border-0">
                <div>
                    <div
                        class="fw-semibold"
                        style="
                            color:#009be5;
                            font-size:16px;
                        "
                    >
                        Buyer Form
                    </div>
                    <div class="text-muted small">
                        Create or update buyer
                    </div>
                </div>
                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                ></button>
            </div>
            <div class="modal-body">
                <form id="buyerForm">
                    <input
                        type="hidden"
                        id="buyerId"
                    />
                    <div class="row g-3">
                        <div class="col-lg-6">
                            <label class="donezo-label">
                                NTN / CNIC
                            </label>
                            <input
                                type="text"
                                id="buyerNTN"
                                class="
                                    form-control
                                    donezo-input
                                "
                            >
                        </div>
                        <div class="col-lg-6">
                            <label class="donezo-label">
                                Buyer Name
                            </label>
                            <input
                                type="text"
                                id="buyerName"
                                class="
                                    form-control
                                    donezo-input
                                "
                            >
                        </div>
                        <div class="col-lg-6">
                            <label class="donezo-label">
                                Province
                            </label>
                            <select
                                id="buyerProvince"
                                class="
                                    form-select
                                    donezo-input
                                "
                            >
                                <option value="">
                                    Select Province
                                </option>
                                <option value="BALOCHISTAN">
                                    BALOCHISTAN
                                </option>
                                <option value="AZAD JAMMU AND KASHMIR">
                                    AZAD JAMMU AND KASHMIR
                                </option>
                                <option value="CAPITAL TERRITORY">
                                    CAPITAL TERRITORY
                                </option>
                                <option value="KHYBER PAKHTUNKHWA">
                                    KHYBER PAKHTUNKHWA
                                </option>
                                <option value="PUNJAB">
                                    PUNJAB
                                </option>
                                <option value="SINDH">
                                    SINDH
                                </option>
                                <option value="GILGIT BALTISTAN">
                                    GILGIT BALTISTAN
                                </option>
                            </select>
                        </div>
                        <div class="col-lg-6">
                            <label class="donezo-label">
                                Registration Type
                            </label>
                            <select
                                id="buyerRegistrationType"
                                class="
                                    form-select
                                    donezo-input
                                "
                            >
                                <option value="">
                                    Select Registration Type
                                </option>
                                <option value="Registered">
                                    Registered
                                </option>
                                <option value="Unregistered">
                                    Unregistered
                                </option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="donezo-label">
                                Address
                            </label>
                            <textarea
                                id="buyerAddress"
                                rows="3"
                                class="
                                    form-control
                                    donezo-input
                                "
                            ></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0">
                <button
                    type="button"
                    class="
                        btn-sm
                        btn-donezo-secondary
                    "
                    data-bs-dismiss="modal"
                >
                    Cancel
                </button>
                <button
                    type="button"
                    id="saveBuyerBtn"
                    class="
                        btn-sm
                        btn-donezo-primary
                    "
                >
                    Save Buyer
                </button>
            </div>
        </div>
    </div>
</div>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:1100;">
</div>
