<div class="dashboard-toolbar">
    <!-- LEFT ACTIONS -->
    <div class="toolbar-actions">
        <button class="toolbar-btn" id="importExcelBtn">
            <i class="bi bi-file-earmark-excel"></i>
            <span>Import Excel</span>
        </button>
        <button class="toolbar-btn" id="addBuyerBtn">
            <i class="bi bi-person-plus"></i>
            <span>Add Buyer</span>
        </button>
        <button class="toolbar-btn" id="generateReportBtn">
            <i class="bi bi-file-earmark-bar-graph"></i>
            <span>Generate Report</span>
        </button>
    </div>
    <!-- RIGHT SIDE -->
    <div class="toolbar-right">
        <div class="tax-year-group">
            <label class="tax-year-label">
                Tax Year
            </label>
            <div class="tax-year-select-wrapper">
                <i class="bi bi-calendar3"></i>
                <select id="globalFySelect" class="tax-year-select">
                </select>
            </div>
        </div>
        <button class="create-invoice-btn" id="createInvoiceBtn">
            <i class="bi bi-plus-lg"></i>
            <span>Create Invoice</span>
        </button>
    </div>
</div>
<!-- KPI ROW -->
<div class="row g-3 mb-2" id="kpiRow"></div>
<!-- CHARTS -->
<div class="row g-3">
    <div class="col-lg-12">
        <div class="card shadow-sm border-0 rounded-4 mb-3">
            <div class="card-body">
                <div class="donezo-card-header d-flex justify-content-between align-items-center mb-2">
                    <div>
                        <div class="fw-semibold" style="color: #009be5;">
                            Monthly Sales
                        </div>
                        <div class="text-muted small">
                            Sales trend by month
                        </div>
                    </div>
                </div>
                <div id="monthlySalesChart"></div>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 mb-3">
            <div class="card-body">
                <div class="donezo-card-header d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <div class="fw-semibold" style="color: #009be5;">
                            Sales Distribution
                        </div>
                        <div class="text-muted small">
                            Distributed by Quarters
                        </div>
                    </div>
                </div>
                <div id="quarterlySalesChart"></div>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 mb-3">
            <div class="card-body">
                <div class="donezo-card-header d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <div class="fw-semibold" style="color: #009be5;">
                            Monthly Invoices
                        </div>
                        <div class="text-muted small">
                            Last 12 months performance
                        </div>
                    </div>
                </div>
                <div id="invoiceCountChart"></div>
            </div>
        </div>
    </div>
</div>
