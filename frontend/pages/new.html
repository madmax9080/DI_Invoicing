        <div class="container py-4">
            <div class="invoice-card client-profile-card mx-auto">
                <!-- HEADER STRIP -->
                <div class="box-title">
                    Client Profile
                    <div>
                        <button id="editClientBtn" class="btn btn-sm btn-primary px-4">
                        Edit
                        </button>
                        <button id="cancelClientEditBtn"
                                class="btn btn-sm btn-outline-secondary d-none">
                        Cancel
                        </button>
                    </div>
                </div>
                <!-- FORM -->
                <form id="clientProfileForm" class="client-form">
                    <div class="form-group-vertical">
                        <label for="sellerName">Client Name</label>
                        <input type="text" id="sellerName" class="form-control" disabled>
                    </div>
                    <div class="form-group-vertical">
                        <label for="sellerNTNCNIC">NTN / CNIC</label>
                        <input type="text" id="sellerNTNCNIC" class="form-control" disabled>
                    </div>
                    <div class="form-group-vertical">
                        <label for="sellerBusinessName">Business Name</label>
                        <input type="text" id="sellerBusinessName" class="form-control" disabled>
                    </div>
                    <div class="form-group-vertical" id="provinceViewWrapper">
                        <label for="sellerProvinceText">Province</label>
                        <input type="text" id="sellerProvinceText" 
                            class="form-control" disabled>
                    </div>
                    <div class="form-group-vertical d-none" id="provinceEditWrapper">
                        <label for="sellerProvince">Province</label>
                        <select id="sellerProvince" class="form-select" disabled>
                            <option value="" disabled selected></option>
                        </select>
                    </div>
                    <div class="form-group-vertical">
                        <label for="sellerFbrToken">FBR Token</label>
                        <input type="text" id="sellerFbrToken" class="form-control" disabled>
                    </div>
                    <div class="form-group-vertical">
                        <label for="sellerAddress">Business Address</label>
                        <input type="text" id="sellerAddress" class="form-control" disabled>
                    </div>
                    <!-- ACTION -->
                    <div class="text-end mt-3 d-none" id="clientSaveWrapper">
                        <button type="submit"
                                class="btn btn-success px-4 fw-semibold">
                        Update Client
                        </button>
                    </div>
                </form>
            </div>
        </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1100;"></div>
