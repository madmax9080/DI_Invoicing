<div class="reports-container client-page-shell">
    <section class="reports-hero client-hero">
        <div>
            <div class="hero-chip">Seller profile</div>
            <h2>View and maintain your business profile details.</h2>
            <p>Keep your seller information up to date with a clean, modern workspace.</p>
        </div>
        <div class="client-hero-actions">
            <button id="editClientBtn" class="export-btn">
                <i class="bi bi-pencil-square"></i>
                <span>Edit Profile</span>
            </button>
            <button id="cancelClientEditBtn" class="btn btn-donezo-secondary d-none">
                Cancel
            </button>
        </div>
    </section>

    <section class="panel-card client-profile-card">
        <form id="clientProfileForm">
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="donezo-form-group">
                        <label>Client Name</label>
                        <input type="text" id="sellerName" class="donezo-input" disabled>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="donezo-form-group">
                        <label>NTN / CNIC</label>
                        <input type="text" id="sellerNTNCNIC" class="donezo-input" disabled>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="donezo-form-group">
                        <label>Business Name</label>
                        <input type="text" id="sellerBusinessName" class="donezo-input" disabled>
                    </div>
                </div>
                <div class="col-lg-6" id="provinceViewWrapper">
                    <div class="donezo-form-group">
                        <label>Province</label>
                        <input type="text" id="sellerProvinceText" class="donezo-input" disabled>
                    </div>
                </div>
                <div class="col-lg-6 d-none" id="provinceEditWrapper">
                    <div class="donezo-form-group">
                        <label>Province</label>
                        <select id="sellerProvince" class="donezo-input" disabled>
                            <option value="" disabled selected></option>
                        </select>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="donezo-form-group">
                        <label>FBR Token</label>
                        <input type="text" id="sellerFbrToken" class="donezo-input" disabled>
                    </div>
                </div>
                <div class="col-lg-12">
                    <div class="donezo-form-group">
                        <label>Business Address</label>
                        <input type="text" id="sellerAddress" class="donezo-input" disabled>
                    </div>
                </div>
            </div>
            <div class="donezo-form-footer d-none" id="clientSaveWrapper">
                <button type="submit" class="btn btn-donezo-primary">
                    Update Client Profile
                </button>
            </div>
        </form>
    </section>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:1100;">
</div>
