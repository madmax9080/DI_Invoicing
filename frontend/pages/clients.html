<div class="donezo-page">
    <!-- PROFILE CARD -->
    <div class="donezo-card client-profile-card">
        <!-- HEADER -->
        <div class="donezo-card-header">
            <div>
                <div class="donezo-card-title">
                    Seller Profile
                </div>
            </div>
            <div class="donezo-card-actions">
                <button id="editClientBtn"
                        class="btn donezo-btn-primary btn-sm">
                    Edit Profile
                </button>
                <button id="cancelClientEditBtn"
                        class="btn donezo-btn-secondary d-none btn-sm">
                    Cancel
                </button>
            </div>
        </div>
        <!-- BODY -->
        <div class="donezo-card-body">
            <form id="clientProfileForm">
                <div class="row g-4">
                    <!-- CLIENT NAME -->
                    <div class="col-lg-6">
                        <div class="donezo-form-group">
                            <label>Client Name</label>
                            <input type="text"
                                   id="sellerName"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                    <!-- NTN -->
                    <div class="col-lg-6">
                        <div class="donezo-form-group">
                            <label>NTN / CNIC</label>
                            <input type="text"
                                   id="sellerNTNCNIC"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                    <!-- BUSINESS NAME -->
                    <div class="col-lg-6">
                        <div class="donezo-form-group">
                            <label>Business Name</label>
                            <input type="text"
                                   id="sellerBusinessName"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                    <!-- PROVINCE VIEW -->
                    <div class="col-lg-6"
                         id="provinceViewWrapper">
                        <div class="donezo-form-group">
                            <label>Province</label>
                            <input type="text"
                                   id="sellerProvinceText"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                    <!-- PROVINCE EDIT -->
                    <div class="col-lg-6 d-none"
                         id="provinceEditWrapper">
                        <div class="donezo-form-group">
                            <label>Province</label>
                            <select id="sellerProvince"
                                    class="donezo-input"
                                    disabled>
                                <option value="" disabled selected>
                                </option>
                            </select>
                        </div>
                    </div>
                    <!-- FBR TOKEN -->
                    <div class="col-lg-6">
                        <div class="donezo-form-group">
                            <label>FBR Token</label>
                            <input type="text"
                                   id="sellerFbrToken"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                    <!-- ADDRESS -->
                    <div class="col-lg-12">
                        <div class="donezo-form-group">
                            <label>Business Address</label>
                            <input type="text"
                                   id="sellerAddress"
                                   class="donezo-input"
                                   disabled>
                        </div>
                    </div>
                </div>
                <!-- FOOTER ACTION -->
                <div class="donezo-form-footer d-none"
                     id="clientSaveWrapper">
                    <button type="submit"
                            class="btn donezo-btn-success btn-sm">
                        Update Client Profile
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:1100;">
</div>
