<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Select Client</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f7fb;
  --panel: #ffffff;
  --panel-soft: rgba(255, 255, 255, 0.9);
  --accent: #009be5;
  --accent-2: #146e98;
  --accent-gradient: linear-gradient(135deg, #146e98 0%, #009be5 100%);
  --text: #0f172a;
  --muted: #64748b;
  --border: rgba(15, 23, 42, 0.08);
  --shadow: 0 18px 45px rgba(2, 6, 23, 0.08);
}

* {
  box-sizing: border-box;
}

body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  min-height: 100vh;
  padding: 24px;
  color: var(--text);
  background:
    radial-gradient(circle at top left, rgba(0, 155, 229, 0.16), transparent 28%),
    linear-gradient(135deg, #f9fcff 0%, #eef4fb 60%, #f7f9fc 100%);
}

.page-shell {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.hero-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(246,251,255,0.92));
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: 24px;
  padding: 24px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
  position: relative;
  overflow: hidden;
}

.hero-card::before {
  content: '';
  position: absolute;
  inset: auto -40px -40px auto;
  width: 220px;
  height: 220px;
  border-radius: 999px;
  background: radial-gradient(circle, rgba(0, 155, 229, 0.2), transparent 70%);
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(0, 155, 229, 0.12);
  color: var(--accent-2);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.hero-card h1 {
  margin: 0 0 8px;
  font-size: clamp(1.45rem, 2.2vw, 2.2rem);
  font-weight: 700;
}

.hero-card h1 span {
  color: var(--accent);
}

.hero-card p {
  margin: 0;
  color: var(--muted);
  max-width: 620px;
  line-height: 1.6;
}

.new-client-btn {
  background: var(--accent-gradient);
  border: none;
  color: white;
  padding: 12px 16px;
  border-radius: 999px;
  box-shadow: 0 10px 24px rgba(0, 155, 229, 0.25);
  font-weight: 600;
}

.new-client-btn:hover {
  color: white;
  transform: translateY(-1px);
}

.toolbar-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.04);
}

.search {
  position: relative;
  flex: 1;
  max-width: 560px;
}

.search input {
  width: 100%;
  padding: 13px 44px 13px 16px;
  border-radius: 999px;
  border: 1px solid #dbeafe;
  background: #f8fbff;
  outline: none;
  transition: all 0.2s ease;
  font-size: 0.95rem;
}

.search input::placeholder {
  color: #94a3b8;
}

.search input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 155, 229, 0.14);
  background: white;
}

.search .icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #94a3b8;
  pointer-events: none;
  font-size: 1rem;
}

.toolbar-meta .pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(0, 155, 229, 0.09);
  color: var(--accent-2);
  font-size: 0.9rem;
  font-weight: 600;
}

#clientGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 20px;
}

.client-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  cursor: pointer;
  position: relative;
  min-height: 170px;
  overflow: hidden;
  transition: all 0.24s ease;
  box-shadow: 0 10px 18px rgba(15, 23, 42, 0.03);
}

.client-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 155, 229, 0.08), transparent 55%);
  opacity: 0;
  transition: opacity 0.24s ease;
}

.client-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 34px rgba(15, 23, 42, 0.08);
  border-color: rgba(0, 155, 229, 0.25);
}

.client-card:hover::before {
  opacity: 1;
}

.client-card.active {
  border-color: var(--accent);
  box-shadow: 0 14px 30px rgba(0, 155, 229, 0.16);
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: var(--accent-gradient);
  color: white;
  font-weight: 700;
  display: grid;
  place-items: center;
  font-size: 1rem;
  letter-spacing: 0.04em;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.16);
}

.card-body h3 {
  font-size: 1rem;
  font-weight: 700;
  margin: 0 0 6px;
}

.client-name {
  font-size: 0.9rem;
  color: var(--muted);
  margin: 0;
}

.add-card {
  border: 2px dashed #cbd5e1;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  color: #64748b;
  min-height: 170px;
}

.add-card:hover {
  background: #f8fbff;
  color: var(--accent);
  border-color: var(--accent);
}

.empty-state {
  grid-column: 1 / -1;
  display: flex;
  justify-content: center;
  padding: 24px 0 10px;
}

.empty-card {
  background: rgba(255, 255, 255, 0.92);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  max-width: 480px;
  width: 100%;
  box-shadow: var(--shadow);
}

.empty-icon {
  font-size: 2.4rem;
  margin-bottom: 12px;
}

.empty-card h2 {
  font-size: 1.35rem;
  margin-bottom: 8px;
}

.empty-card p {
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.6;
}

.empty-btn {
  background: var(--accent-gradient);
  border: none;
  color: white;
  border-radius: 999px;
  padding: 10px 18px;
}

.custom-modal {
  border-radius: 20px;
  border: none;
  box-shadow: 0 24px 60px rgba(2, 6, 23, 0.16);
}

.custom-input {
  border-radius: 12px;
  border: 1px solid #dbeafe;
  padding: 10px 12px;
  transition: all 0.2s ease;
}

.custom-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0, 155, 229, 0.12);
}

.form-label {
  font-size: 0.85rem;
  font-weight: 600;
  color: #334155;
}

.modal-footer .btn {
  border-radius: 999px;
  padding: 10px 16px;
}

#saveClientBtn {
  background: var(--accent-gradient);
  border: none;
}

#saveClientBtn:hover {
  opacity: 0.95;
  transform: translateY(-1px);
}

@media (max-width: 768px) {
  body {
    padding: 16px;
  }

  .hero-card {
    flex-direction: column;
    align-items: flex-start;
  }

  .toolbar-card {
    flex-direction: column;
    align-items: stretch;
  }

  .search {
    max-width: none;
  }
}
</style>
</head>

<body>
  <div class="page-shell">
    <section class="hero-card">
      <div>
        <div class="eyebrow">Invoicing workspace</div>
        <h1>Choose a <span>client</span> to continue</h1>
        <p>Select an existing workspace or create a fresh client profile in a few clicks.</p>
      </div>
      <button class="btn new-client-btn" id="newClientBtn">+ Add Client</button>
    </section>

    <section class="toolbar-card">
      <div class="search">
        <input type="text" id="searchInput" placeholder="Search by business name">
        <span class="icon">⌕</span>
      </div>
      <div class="toolbar-meta">
        <span class="pill"><strong id="clientCount">0</strong> clients</span>
      </div>
    </section>

    <div id="clientGrid"></div>
  </div>

<div class="modal fade" id="addClientModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content custom-modal">
      <div class="modal-header border-0 pb-0">
        <div>
          <h4 class="modal-title fw-semibold mb-1">Create New Client</h4>
          <p class="text-muted small mb-0">Add business details to start invoicing</p>
        </div>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name *</label>
            <input id="clientNameInput" class="form-control custom-input"
              placeholder="e.g. Ali Raza">
          </div>
          <div class="col-md-6">
            <label class="form-label">NTN / CNIC *</label>
            <input id="clientNTNInput" class="form-control custom-input"
              placeholder="1234567 or 12345-1234567-1">
          </div>
          <div class="col-12">
            <label class="form-label">Business Name *</label>
            <input id="clientBusinessInput" class="form-control custom-input"
              placeholder="e.g. ABC Enterprises Pvt Ltd">
          </div>
          <div class="col-md-6">
            <label class="form-label">Province *</label>
            <select id="clientProvinceInput" class="form-select custom-input">
              <option value="">Select province...</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">FBR Token *</label>
            <input id="clientTokenInput" class="form-control custom-input"
              placeholder="Enter secure API token">
          </div>
          <div class="col-12">
            <label class="form-label">Business Address *</label>
            <textarea id="clientAddressInput" class="form-control custom-input"
              rows="2" placeholder="Full business address"></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0 d-flex justify-content-between">
        <button class="btn btn-light px-4" data-bs-dismiss="modal">
          Cancel
        </button>
        <button class="btn btn-primary px-4 fw-semibold" id="saveClientBtn">
          Save Client →
        </button>
      </div>
    </div>
  </div>
</div>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1100;"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./assets/js/pages/select_client.js"></script>

</body>
</html>
