<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pegasus Solutions | Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/login.css">
</head>
<body>
<div class="container-fluid">
    <div class="row g-0">
        <div class="col-lg-6 left-section p-4">
            <div class="form-box">
                <img class="logo" src="./assets/images/new_brand.png">
                <h3 class="title"><span class="color">WELCOME</span> BACK</h3>
                <p class="text-muted mb-4 subtitle">Please enter log in details below</p>
                <input id="email" type="email" class="form-control mb-3" placeholder="Email">
                <div class="position-relative mb-2">
                    <input id="password" type="password" id="password" class="form-control mb-4" placeholder="Password">
                    <span onclick="togglePassword()" 
                        style="position:absolute; right:15px; top:8px; cursor:pointer; font-size: 23px; color: #009be5;">👁</span>
                </div>
                <button id="loginBtn" class="btn btn-dark w-100 mb-5">Sign in →</button>
                <p class="text-muted mb-4 brand-footer">© 2026 Pegasus Solutions — Pakistan</p>
            </div>
        </div>
       <div class="col-lg-6 right-section d-none d-lg-flex">
          <div class="bg-image">
              <div class="overlay-content">
                  <h3 class="title"><span class="color">Digital</span> Invoicing System</h3>
                  <p>Multi Client, Real Time & Cloud Based</p>
              </div>
          </div>
      </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>
<script type="module" src="./assets/js/pages/login.js"></script>
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index:1100;"></div>
</body>
</html>
