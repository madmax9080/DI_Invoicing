<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Invoicing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="./assets/css/dashboard.css?v=1.0">
<link rel="stylesheet" href="./assets/css/reports.css?v=1.0">
<link rel="stylesheet" href="./assets/css/excel_import.css?v=1.0">
<link rel="stylesheet" href="./assets/css/invoice.css?v=1.0">
<style>
.topbar {
    padding: 24px 32px;
    background: transparent;
}
.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.header-right {
    display: flex;
    align-items: center;
}
.welcome-title {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    color: #0f172a;
}
.welcome-title span {
    color: #2563eb;
}
.welcome-subtitle {
    margin-top: 6px;
    margin-bottom: 0;
    font-size: 15px;
    color: #64748b;
}
.client-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 12px 16px;
    min-width: 340px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    flex-wrap: wrap;
}
.client-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(
        135deg,
        #2563eb,
        #0ea5e9
    );
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 400;
}
.client-details {
    flex: 1;
}
.client-name {
    font-size: 15px;
    font-weight: 600;
    color: #0f172a;
}
.client-business {
    font-size: 13px;
    color: #64748b;
}
.logout-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 10px;
    background: #f8fafc;
    color: #475569;
    transition: all .2s ease;
}

.logout-btn:hover {
    background: #ef4444;
    color: #fff;
}

.sidebar {
    display: flex;
    flex-direction: column;
}

.menu {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
}

.menu-links {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.sidebar-footer {
    padding-top: 10px;
}

.client-card {
    width: 100%;
    min-width: auto;
}

.welcome-title {
    font-size: 24px;
}
</style>
</head>
<body>
<!-- SIDEBAR -->
<div class="sidebar">
    <img src="./assets/images/brand_white.png" class="brand-logo">
    <div class="menu">
        <div class="menu-links">
            <div class="menu-section">MENU</div>
            <a class="menu-item active" data-route="dashboard">
                <i class="bi bi-grid"></i>
                <span>Dashboard</span>
            </a>
            <a class="menu-item" data-route="create_invoice">
                <i class="bi bi-receipt"></i>
                <span>Create Invoice</span>
            </a>
            <a class="menu-item" data-route="import_excel">
                <i class="bi bi-file-earmark-excel"></i>
                <span>Import Excel</span>
            </a>
            <a class="menu-item" data-route="reports">
                <i class="bi bi-bar-chart"></i>
                <span>Reports</span>
            </a>
            <a class="menu-item" data-route="buyers">
                <i class="bi bi-people"></i>
                <span>Buyers</span>
            </a>
            <a class="menu-item" data-route="seller_profile">
                <i class="bi bi-person"></i>
                <span>Seller Profile</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <a class="menu-item" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>
</div>
<!-- MAIN -->
<div class="topbar">
    <div class="dashboard-header">
        <!-- LEFT -->
        <div class="header-left">
            <h2 class="welcome-title">
                Good Morning,
                <span id="headerUserName">Muhammad</span>
                <span class="wave">👋</span>
            </h2>
            <p id="welcomeSubtitle" class="welcome-subtitle">
                Here's your business overview for FY
            </p>
        </div>
        <!-- RIGHT -->
        <div class="header-right">
            <div class="client-card">
                <div class="client-avatar" id="clientAvatar"></div>
                <div class="client-details">
                    <div id="clientNameDisplay" class="client-name"></div>
                    <div id="clientBusiness" class="client-business"></div>
                </div>
                <button id="switchClientBtn" class="logout-btn" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
<div class="main">
    <div id="appContent"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./assets/js/app.js?v=1.0"></script>
</body>
</html>
