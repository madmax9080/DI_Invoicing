<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Invoicing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link rel="stylesheet" href="./assets/css/dashboard.css">
<link rel="stylesheet" href="./assets/css/reports.css">
<link rel="stylesheet" href="./assets/css/excel_import.css">
<link rel="stylesheet" href="./assets/css/invoice.css">
<style>

/* Client info container */
.client-info {
  background: #f8f9fa;
  border-radius: 12px;
  border: 1px solid #eee;
}

/* Avatar styling */
.client-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #009be5;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* Button refinement */
.switch-btn {
  border-radius: 10px;
  padding: 6px 12px;
  font-weight: 500;
  white-space: nowrap;
}

.switch-btn:hover {
  background-color: #009be5;
  color: #fff;
}
</style>
</head>
<body>
<!-- SIDEBAR -->
<div class="sidebar">
    <img src="./assets/images/brand_white.png" class="brand-logo">
    <div class="menu">
        <div class="menu-section">MENU</div>
        <a class="menu-item active" data-route="dashboard">
            <i class="bi bi-grid"></i>
            <span>Dashboard</span>
        </a>
        <a class="menu-item" data-route="create_invoice">
            <i class="bi bi-receipt"></i>
            <span>Create Invoice</span>
        </a>
         <a class="menu-item" data-route="import_excel">
            <i class="bi bi-file-earmark-excel"></i>
            <span>Import Excel</span>
        </a>
        <a class="menu-item" data-route="reports">
            <i class="bi bi-bar-chart"></i>
            <span>Reports</span>
        </a>
        <a class="menu-item" data-route="buyers">
            <i class="bi bi-people"></i>
            <span>Buyers</span>
        </a>
        <a class="menu-item" data-route="seller_profile">
            <i class="bi bi-person"></i>
            <span>Seller Profile</span>
        </a><br><br><br><br>
        <a class="menu-item" id="logoutBtn">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </a><br><br><br><br><br><br><br><br><br><br><br><br>
    </div>
</div>
<!-- MAIN -->
<div class="topbar d-flex justify-content-between align-items-center px-3">
    
    <!-- LEFT: Page Info -->
    <div>
        <div id="pageTitle" class="fw-semibold" style="font-size:18px;">
            Dashboard
        </div>
        <div id="pageSubtitle" class="text-muted" style="font-size:13px;">
            Digital Invoice Management
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="client-info d-flex align-items-center gap-2 px-3 py-2">
            <div class="client-avatar" id="clientAvatar"></div>
            <div class="client-text">
                <div id="clientNameDisplay" class="fw-medium"></div>
                <div id="clientBusiness" class="text-muted small"></div>
            </div>
        </div>
        <button id="switchClientBtn" class="btn btn-dark btn-sm switch-btn">
        <i class="bi bi-box-arrow-right"></i> Logout
    </button>
    </div>
</div>
<div class="main">
    <div id="appContent"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./assets/js/app.js"></script>
</body>
</html>
